name: planetapeli
description: "PlanetaPeli - Streaming app tipo Netflix"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  http: ^1.2.2
  shared_preferences: ^2.5.5
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  video_player: ^2.9.2
  chewie: ^1.8.5
  webview_flutter: ^4.4.4
  screen_brightness: ^0.2.2+1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
